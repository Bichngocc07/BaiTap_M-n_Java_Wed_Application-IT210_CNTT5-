<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">

<head>
    <title>Danh sách món ăn</title>

    <style>
        .out-of-stock {
            color: red;
        }
    </style>
</head>

<body>

<div layout:fragment="content">

    <h2>Danh sách món ăn</h2>

    <!-- ❗ Thông báo lỗi (từ bài 3 nếu ID sai) -->
    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <!-- ❗ Bẫy dữ liệu rỗng -->
    <p th:if="${dishes == null or #lists.isEmpty(dishes)}">
        Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau
    </p>

    <!-- ✅ Bảng dữ liệu -->
    <table border="1"
           th:if="${dishes != null and !#lists.isEmpty(dishes)}">

        <tr>
            <th>ID</th>
            <th>Tên món</th>
            <th>Giá</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>

        <tr th:each="dish : ${dishes}"
            th:classappend="${!dish.available} ? 'out-of-stock'">

            <td th:text="${dish.id}"></td>
            <td th:text="${dish.name}"></td>
            <td th:text="${dish.price}"></td>

            <td>
                <span th:if="${dish.available}">Còn hàng</span>
                <span th:unless="${dish.available}">Hết hàng</span>
            </td>

            <!-- ✅ Nút chỉnh sửa (bài 3) -->
            <td>
                <a th:href="@{/bai3/edit/{id}(id=${dish.id})}">
                    Chỉnh sửa
                </a>
            </td>

        </tr>

    </table>

</div>

</body>
</html>
