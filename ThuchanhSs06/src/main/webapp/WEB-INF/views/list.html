<!DOCTYPE html>
<html layout:decorate="layout/main-layout"
      xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml">

<div layout:fragment="content">

    <h2>Danh sách khóa học</h2>

    <!-- SEARCH -->
    <form method="get" th:action="@{/course/list}">
        <select name="level">
            <option value="">All</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select>

        <input type="number" name="maxFee" placeholder="Max fee"/>
        <button type="submit">Search</button>
    </form>

    <!-- MESSAGE -->
    <p th:if="${message}" th:text="${message}"></p>
    <p style="color:red" th:if="${error}" th:text="${error}"></p>
    <p style="color:green" th:if="${success}" th:text="${success}"></p>

    <!-- TABLE -->
    <table border="1">
        <tr>
            <th>Tên</th>
            <th>Level</th>
            <th>Học phí</th>
            <th>Action</th>
        </tr>

        <tr th:each="c : ${courses}">
            <td th:text="${c.name}"></td>
            <td th:text="${c.level}"></td>

            <td th:text="${#numbers.formatDecimal(c.fee,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>

            <td>
                <a th:href="@{/course/detail/{code}(code=${c.code})}">Chi tiết</a> |
                <a th:href="@{/course/edit/{code}(code=${c.code})}">Sửa</a> |

                <form th:action="@{/course/delete/{code}(code=${c.code})}"
                      method="post" style="display:inline">
                    <button>Xóa</button>
                </form>
            </td>
        </tr>
    </table>

</div>
</html>
